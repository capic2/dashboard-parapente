version: '3.9'

services:
  redis:
    image: redis:8.6-alpine
    container_name: parapente-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - parapente-network
    labels:
      - "com.docker.compose.project=dashboard-parapente"
      - "com.docker.compose.service=redis"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: parapente-backend:latest
    container_name: parapente-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # Application
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_FAKE_REDIS=false
      
      # Weather API Keys
      - WEATHERAPI_KEY=${WEATHERAPI_KEY:-64cfa0092fa84c77940180226261802}
      - METEOBLUE_API_KEY=${METEOBLUE_API_KEY:-Kd8IHD0Oj5zCmWUa}
      
      # Strava OAuth
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID:-73115}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET:-34de079501057b6409367e7bea00ecebb9f6e4d6}
      - STRAVA_REFRESH_TOKEN=${STRAVA_REFRESH_TOKEN:-fb3a53726c083e884e145fe66a34237ffc0cd3ef}
      - STRAVA_ACCESS_TOKEN=${STRAVA_ACCESS_TOKEN:-5aad34b765ac46ce6072caf40ac7c95ab180148b}
      
      # Scheduler
      - SCHEDULER_ENABLED=true
      - SCHEDULER_INTERVAL_MINUTES=30
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/db:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - parapente-network
    labels:
      - "com.docker.compose.project=dashboard-parapente"
      - "com.docker.compose.service=backend"

volumes:
  redis-data:
    driver: local
    labels:
      - "com.docker.compose.project=dashboard-parapente"

networks:
  parapente-network:
    driver: bridge
    labels:
      - "com.docker.compose.project=dashboard-parapente"
