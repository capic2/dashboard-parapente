version: '3.9'

services:
  redis:
    image: redis:8.6-alpine
    container_name: parapente-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - parapente-network
    labels:
      - "com.docker.compose.project=dashboard-parapente"
      - "com.docker.compose.service=redis"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: parapente-backend:latest
    container_name: parapente-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      # Application
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - USE_FAKE_REDIS=${USE_FAKE_REDIS:-false}
      
      # Weather API Keys (set in Portainer)
      - WEATHERAPI_KEY=${WEATHERAPI_KEY}
      - METEOBLUE_API_KEY=${METEOBLUE_API_KEY}
      
      # Strava OAuth (set in Portainer)
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET}
      - STRAVA_REFRESH_TOKEN=${STRAVA_REFRESH_TOKEN}
      - STRAVA_ACCESS_TOKEN=${STRAVA_ACCESS_TOKEN}
      
      # Scheduler
      - SCHEDULER_ENABLED=${SCHEDULER_ENABLED:-true}
      - SCHEDULER_INTERVAL_MINUTES=${SCHEDULER_INTERVAL_MINUTES:-30}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/db:/app/db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - parapente-network
    labels:
      - "com.docker.compose.project=dashboard-parapente"
      - "com.docker.compose.service=backend"

volumes:
  redis-data:
    driver: local
    labels:
      - "com.docker.compose.project=dashboard-parapente"

networks:
  parapente-network:
    driver: bridge
    labels:
      - "com.docker.compose.project=dashboard-parapente"
