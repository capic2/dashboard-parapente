name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Chromatic (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎨 Publish to Chromatic
        id: chromatic
        uses: chromaui/action@latest
        # Known segfault in Storybook build with Vite 8 Rolldown (5000+ modules).
        # continue-on-error prevents masking real regressions as the same red X.
        # When this is fixed upstream, remove continue-on-error.
        continue-on-error: true
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/frontend
          buildScriptName: build-storybook
          onlyChanged: true
          exitZeroOnChanges: true
          exitOnceUploaded: true
          autoAcceptChanges: main
          skip: "renovate/**"

      - name: ⚠️ Chromatic build failed
        if: steps.chromatic.outcome == 'failure'
        run: |
          echo "::warning::Chromatic build failed (likely Storybook/Rolldown segfault). See https://github.com/storybookjs/storybook/issues/33789"
