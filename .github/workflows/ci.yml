name: CI - Nx Monorepo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  main:
    name: main
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NX Local Cache: fallback when NX Cloud credits are exhausted
      # This cache is also used for Renovate PRs to conserve NX Cloud credits
      # Cache strategy:
      #   - Primary: OS + package-lock hash + git SHA (exact match)
      #   - Fallback 1: OS + package-lock hash (recent builds with same deps)
      #   - Fallback 2: OS only (any recent build)
      - name: 💾 Setup NX Cache (local fallback)
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nx-${{ runner.os }}-

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: 📦 Install npm dependencies
        run: npm ci

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/backend && pip install -r requirements.txt

      - name: 🎭 Install Playwright (Frontend)
        run: |
          cd apps/frontend
          npx playwright install --with-deps chromium

      - name: 🎭 Install Playwright (Backend)
        run: |
          cd apps/backend
          playwright install chromium
          playwright install-deps chromium

      - name: 🔍 Derive SHAs for Nx affected
        uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: "main"

      # NX Cloud strategy:
      # - Default: NX Cloud ENABLED
      # - If 'skip-nx-cloud' label present: use local cache only
      # - If credits exhausted at runtime: auto-add label + auto-retry with local cache
      # - Renovate PRs always have 'skip-nx-cloud' (configured in renovate.json)
      - name: 🎛️ Configure NX Cloud execution
        run: |
          # Pushes to main: always use local cache (NX Cloud credits are limited)
          # PRs: use NX Cloud unless 'skip-nx-cloud' label is present
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
            echo "💾 Push to main: using local cache (NX Cloud reserved for PRs)"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "skip-nx-cloud"; then
              echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
              echo "⚠️  NX Cloud DISABLED (skip-nx-cloud label)"
            else
              echo "NX_NO_CLOUD=false" >> $GITHUB_ENV
              echo "✅ NX Cloud ENABLED"
            fi
          else
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🔨 Run affected builds
        id: build
        continue-on-error: true
        run: npx nx affected -t build --parallel=3 --exclude=e2e

      - name: 💡 Handle NX Cloud credits exhaustion
        if: always() && steps.build.outcome == 'failure'
        run: |
          # Check for NX Cloud credits exhaustion patterns in logs
          if gh run view ${{ github.run_id }} --log 2>&1 | grep -qE "(Workspace is unable to be authorized|exceeding the FREE plan|Workspace is disabled)"; then
            echo "=========================================="
            echo "⚠️  NX CLOUD CREDITS EXHAUSTED"
            echo "=========================================="

            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              # Add labels to PR for the retry
              echo "Adding labels to PR #${{ github.event.pull_request.number }}..."
              gh pr edit ${{ github.event.pull_request.number }} \
                --add-label "nx-cloud-no-credit" \
                --add-label "skip-nx-cloud" \
                && echo "✅ Labels added" || echo "⚠️ Failed to add labels"

              # Post comment (avoid duplicates)
              EXISTING_COMMENT=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.author.login=="github-actions" and (.body | contains("NX Cloud credits exhausted"))) | .id' | head -1)
              if [[ -z "$EXISTING_COMMENT" ]]; then
                printf '%s\n' \
                  '## ⚠️ NX Cloud credits exhausted' \
                  '' \
                  'NX Cloud free tier credits are exhausted.' \
                  'Labels `skip-nx-cloud` + `nx-cloud-no-credit` added automatically.' \
                  '' \
                  '**Retrying with local cache...** No action needed.' \
                  '' \
                  '---' \
                  '_Automated message. Will not be duplicated on re-runs._' \
                  > /tmp/pr_comment.md
                gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr_comment.md \
                  && echo "✅ Comment posted" || echo "⚠️ Failed to post comment"
              fi

              # Auto-retry: re-run failed jobs (will now see skip-nx-cloud label)
              echo "🔄 Re-running failed jobs with local cache..."
              gh run rerun ${{ github.run_id }} --failed \
                && echo "✅ Re-run triggered" || echo "⚠️ Failed to trigger re-run"
              exit 0
            else
              # Push to main (no PR) - auto-retry with local cache
              echo "⚠️ NX Cloud credits exhausted on main push - auto-retrying with local cache..."
              gh run rerun ${{ github.run_id }} --failed \
                && echo "✅ Re-run triggered" || echo "⚠️ Failed to trigger re-run"
              exit 0
            fi
          else
            echo "::error title=Build Failed::The build failed for a reason other than NX Cloud credits."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🎨 Run affected lints
        if: success() || (failure() && steps.build.outcome == 'success')
        run: npx nx affected -t lint --parallel=3 --exclude=e2e

      - name: 📝 Run affected type-check
        if: success() || (failure() && steps.build.outcome == 'success')
        run: npx nx affected -t type-check --parallel=3 --exclude=e2e

      - name: 🧪 Run affected tests (frontend + backend in parallel)
        if: success() || (failure() && steps.build.outcome == 'success')
        run: npx nx affected -t test --parallel=3 --exclude=e2e
        env:
          TESTING: true
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key

      - name: 📊 Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/apps/frontend/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: 📊 Upload backend coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/apps/backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # NX Local Cache for E2E: same strategy as main job
      - name: 💾 Setup NX Cache (local fallback)
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-e2e-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-e2e-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nx-e2e-${{ runner.os }}-

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: 📦 Install npm dependencies
        run: npm ci

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/backend && pip install -r requirements.txt

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Configure NX Cloud for E2E: same logic as main job
      - name: 🎛️ Configure NX Cloud execution
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "skip-nx-cloud"; then
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
            echo "⚠️  NX Cloud DISABLED (skip-nx-cloud label)"
          else
            echo "NX_NO_CLOUD=false" >> $GITHUB_ENV
            echo "✅ NX Cloud ENABLED"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🧪 Run E2E tests
        run: npx nx e2e e2e --configuration=ci
        env:
          TESTING: false
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key
          BACKEND_STRAVA_VERIFY_TOKEN: PARAPENTE_E2E_TEST

      - name: 📤 Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: apps/e2e/test-results
          retention-days: 7
