name: CI - Nx Monorepo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  main:
    name: main
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🏷️ Remove ready-to-merge label
        if: github.event_name == 'pull_request'
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/ready-to-merge \
            -X DELETE 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NX Local Cache: fallback when NX Cloud credits are exhausted
      # This cache is also used for Renovate PRs to conserve NX Cloud credits
      # Cache strategy:
      #   - Primary: OS + pnpm-lock hash + git SHA (exact match)
      #   - Fallback 1: OS + pnpm-lock hash (recent builds with same deps)
      #   - Fallback 2: OS only (any recent build)
      - name: 💾 Setup NX Cache (local fallback)
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/backend && pip install -r requirements.txt

      - name: 💾 Cache Playwright browsers
        id: playwright-cache-main
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml', 'apps/backend/requirements.txt') }}

      - name: 🎭 Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: 🔍 Derive SHAs for Nx affected
        uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: "main"

      # NX Cloud strategy:
      # - Default: NX Cloud ENABLED
      # - If 'skip-nx-cloud' label present: use local cache only
      # - If credits exhausted at runtime: auto-add label + auto-retry with local cache
      # - Renovate PRs always have 'skip-nx-cloud' (configured in renovate.json)
      - name: 🎛️ Configure NX Cloud execution
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
            echo "Push to main: using local cache"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "skip-nx-cloud"; then
              echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
              echo "NX Cloud DISABLED (skip-nx-cloud label)"
            else
              echo "NX_NO_CLOUD=false" >> $GITHUB_ENV
              echo "NX Cloud ENABLED"
            fi
          else
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🔨 Run affected (build, lint, type-check, test)
        id: nx_tasks
        run: |
          run_nx() {
            local output
            output=$(pnpm exec "$@" 2>&1) || {
              echo "$output"
              if echo "$output" | grep -qE "(Workspace is unable to be authorized|exceeding the FREE plan|Workspace is disabled)"; then
                echo "NX_CLOUD_EXHAUSTED=true" >> $GITHUB_ENV
                return 1
              fi
              return 1
            }
            echo "$output"
          }

          run_nx nx affected -t build --parallel=3 --exclude=e2e
          run_nx nx affected -t lint --parallel=3 --exclude=e2e
          run_nx nx affected -t type-check --parallel=3 --exclude=e2e

          TESTING=true \
          BACKEND_DATABASE_URL=sqlite:///./test.db \
          BACKEND_WEATHERAPI_KEY=test_key \
          BACKEND_METEOBLUE_API_KEY=test_key \
            run_nx nx affected -t test --parallel=3 --exclude=e2e
        continue-on-error: true

      - name: 💡 Handle NX Cloud credits exhaustion
        if: steps.nx_tasks.outcome == 'failure' && env.NX_CLOUD_EXHAUSTED == 'true'
        run: |
          echo "NX Cloud credits exhausted - retrying with local cache"
          echo "NX_NO_CLOUD=true" >> $GITHUB_ENV

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
              -f "labels[]=nx-cloud-no-credit" -f "labels[]=skip-nx-cloud" || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🔄 Retry with local cache
        if: steps.nx_tasks.outcome == 'failure' && env.NX_CLOUD_EXHAUSTED == 'true'
        run: |
          pnpm exec nx affected -t build --parallel=3 --exclude=e2e
          pnpm exec nx affected -t lint --parallel=3 --exclude=e2e
          pnpm exec nx affected -t type-check --parallel=3 --exclude=e2e
          pnpm exec nx affected -t test --parallel=3 --exclude=e2e
        env:
          TESTING: true
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key

      - name: ❌ Fail if non-NX-Cloud error
        if: steps.nx_tasks.outcome == 'failure' && env.NX_CLOUD_EXHAUSTED != 'true'
        run: exit 1

      - name: 📊 Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/apps/frontend/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: 📊 Upload backend coverage
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/apps/backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # NX Local Cache for E2E: same strategy as main job
      - name: 💾 Setup NX Cache (local fallback)
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-e2e-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-e2e-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nx-e2e-${{ runner.os }}-

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v5

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/backend && pip install -r requirements.txt

      - name: 💾 Cache Playwright browsers
        id: playwright-cache-e2e
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 🎭 Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      # Configure NX Cloud for E2E: same logic as main job
      - name: 🎛️ Configure NX Cloud execution
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "skip-nx-cloud"; then
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
            echo "NX Cloud DISABLED (skip-nx-cloud label)"
          else
            echo "NX_NO_CLOUD=false" >> $GITHUB_ENV
            echo "NX Cloud ENABLED"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 🧪 Run E2E tests
        id: e2e
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm exec nx e2e e2e --configuration=ci 2>&1 | tee /tmp/e2e.log
        env:
          TESTING: false
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key
          BACKEND_STRAVA_VERIFY_TOKEN: PARAPENTE_E2E_TEST

      - name: 🔄 Retry E2E with local cache (if NX Cloud exhausted)
        if: steps.e2e.outcome == 'failure'
        run: |
          if grep -qE "(Workspace is unable to be authorized|exceeding the FREE plan|Workspace is disabled)" /tmp/e2e.log; then
            echo "NX Cloud credits exhausted - retrying with local cache"
            gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
              -f "labels[]=nx-cloud-no-credit" -f "labels[]=skip-nx-cloud" || true
            NX_NO_CLOUD=true pnpm exec nx e2e e2e --configuration=ci
          else
            echo "E2E failed for non-NX-Cloud reason"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          TESTING: false
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key
          BACKEND_STRAVA_VERIFY_TOKEN: PARAPENTE_E2E_TEST

      - name: 📤 Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: apps/e2e/test-results
          retention-days: 7
