name: CI - Nx Monorepo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  main:
    name: main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # NX Local Cache: fallback when NX Cloud credits are exhausted
      # This cache is also used for Renovate PRs to conserve NX Cloud credits
      # Cache strategy:
      #   - Primary: OS + package-lock hash + git SHA (exact match)
      #   - Fallback 1: OS + package-lock hash (recent builds with same deps)
      #   - Fallback 2: OS only (any recent build)
      - name: 💾 Setup NX Cache (local fallback)
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nx-${{ runner.os }}-
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt
      
      - name: 📦 Install npm dependencies
        run: npm ci
      
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/backend && pip install -r requirements.txt
      
      - name: 🎭 Install Playwright (Frontend)
        run: |
          cd apps/frontend
          npx playwright install --with-deps chromium
      
      - name: 🎭 Install Playwright (Backend)
        run: |
          cd apps/backend
          playwright install chromium
          playwright install-deps chromium
      
      - name: 🔍 Derive SHAs for Nx affected
        uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: 'main'
      
      # Configure NX Cloud usage based on context
      # - By default, NX Cloud is ENABLED for all PRs
      # - Renovate automatically adds 'skip-nx-cloud' label (configured in renovate.json)
      # - Remove the label from a Renovate PR to enable NX Cloud for that specific update
      # - You can also manually add 'skip-nx-cloud' to any PR to conserve credits
      # When disabled, NX will use the local cache (setup above) as fallback
      # Note: Using NX_NO_CLOUD env var (not --skip-nx-cache flag) to preserve local cache
      - name: 🎛️ Configure NX Cloud execution
        run: |
          # Check if PR has 'skip-nx-cloud' label to disable NX Cloud
          HAS_SKIP_LABEL=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "skip-nx-cloud"; then
              HAS_SKIP_LABEL=true
            fi
          fi
          
          # Set NX_NO_CLOUD to disable only remote cache (preserves local cache)
          if [[ "$HAS_SKIP_LABEL" == "true" ]]; then
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
            echo "⚠️  NX Cloud DISABLED (requested by 'skip-nx-cloud' label to conserve credits)"
            echo "💾 Local cache will still be used"
          else
            echo "NX_NO_CLOUD=false" >> $GITHUB_ENV
            echo "✅ NX Cloud ENABLED"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: 🔨 Run affected builds
        id: build
        continue-on-error: true
        run: npx nx affected -t build --parallel=3 --exclude=e2e
      
      - name: 💡 Check if NX Cloud credits exhausted
        if: always() && steps.build.outcome == 'failure'
        run: |
          # Check for NX Cloud credits exhaustion (more reliable patterns)
          if gh run view ${{ github.run_id }} --log 2>&1 | grep -qE "(Workspace is unable to be authorized|exceeding the FREE plan|Workspace is disabled)"; then
            echo "::error title=NX Cloud Credits Exhausted::Your NX Cloud free tier credits are exhausted. Add the 'skip-nx-cloud' label to this PR to use local cache instead, then re-run the workflow."
            echo ""
            echo "=========================================="
            echo "⚠️  NX CLOUD CREDITS EXHAUSTED"
            echo "=========================================="
            echo ""
            echo "Your NX Cloud organization has exceeded the FREE plan limit."
            echo ""
            echo "📋 Quick fix:"
            echo "  1. Add the 'skip-nx-cloud' label to this PR"
            echo "  2. Re-run the workflow"
            echo "  3. The workflow will use local cache instead (slower but functional)"
            echo ""
            echo "💡 For Renovate PRs: The label is added automatically by Renovate config"
            echo ""
            echo "🔗 More info: https://cloud.nx.app/orgs/65e6f08db35f78b0f34130b8/plans"
            echo ""
            
            # Post comment to PR conversation for maximum visibility
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "Posting comment to PR #${{ github.event.pull_request.number }}..."
              
              # Check if a comment already exists to avoid duplicates
              EXISTING_COMMENT=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq '.comments[] | select(.author.login=="github-actions" and (.body | contains("NX Cloud Credits Exhausted"))) | .id' | head -1)
              
              if [[ -z "$EXISTING_COMMENT" ]]; then
                # Create comment body using printf to avoid YAML heredoc issues
                printf '%s\n' \
                  '## ⚠️ NX Cloud Credits Exhausted' \
                  '' \
                  'Your NX Cloud free tier credits have been exhausted.' \
                  '' \
                  '### 📋 Quick fix' \
                  '' \
                  '1. **Add the `skip-nx-cloud` label** to this PR' \
                  '2. **Re-run the failed workflow** (click "Re-run failed jobs" button)' \
                  '3. The workflow will use local cache instead (slower but functional)' \
                  '' \
                  '### 💡 Note' \
                  '' \
                  '- For Renovate PRs: The label is added automatically by Renovate configuration' \
                  '- Local cache provides ~60-80% of NX Cloud performance' \
                  '- No data loss, just slower CI execution' \
                  '' \
                  '### 🔗 More information' \
                  '' \
                  '- [NX Cloud Plans](https://cloud.nx.app/orgs/65e6f08db35f78b0f34130b8/plans)' \
                  '- [Local cache documentation](https://nx.dev/concepts/cache)' \
                  '' \
                  '---' \
                  '_This is an automated message from the CI workflow. This comment will not be duplicated on re-runs._' \
                  > /tmp/pr_comment.md
                
                gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr_comment.md && echo "✅ Comment posted successfully" || echo "⚠️ Failed to post comment (non-critical)"
              else
                echo "ℹ️ Comment already exists (ID: $EXISTING_COMMENT), skipping duplicate"
              fi
            fi
            
            exit 1
          else
            echo "::error title=Build Failed::The build failed for a reason other than NX Cloud credits."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: 🎨 Run affected lints
        if: success() || (failure() && steps.build.outcome == 'success')
        run: npx nx affected -t lint --parallel=3 --exclude=e2e
      
      - name: 📝 Run affected type-check
        if: success() || (failure() && steps.build.outcome == 'success')
        run: npx nx affected -t type-check --parallel=3 --exclude=e2e
      
      - name: 🧪 Run affected tests (frontend + backend in parallel)
        if: success() || (failure() && steps.build.outcome == 'success')
        run: npx nx affected -t test --parallel=3 --exclude=e2e
        env:
          TESTING: true
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key
      
      - name: 📊 Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/apps/frontend/lcov.info
          flags: frontend
          name: frontend-coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      
      - name: 📊 Upload backend coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/apps/backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
      
      # NX Local Cache for E2E: same strategy as main job
      - name: 💾 Setup NX Cache (local fallback)
        uses: actions/cache@v5
        with:
          path: .nx/cache
          key: nx-e2e-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            nx-e2e-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nx-e2e-${{ runner.os }}-
      
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: apps/backend/requirements.txt
      
      - name: 📦 Install npm dependencies
        run: npm ci
      
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          cd apps/backend && pip install -r requirements.txt
      
      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      # Configure NX Cloud for E2E: same logic as main job
      - name: 🎛️ Configure NX Cloud execution
        run: |
          HAS_SKIP_LABEL=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name' 2>/dev/null || echo "")
            if echo "$LABELS" | grep -q "skip-nx-cloud"; then
              HAS_SKIP_LABEL=true
            fi
          fi
          
          if [[ "$HAS_SKIP_LABEL" == "true" ]]; then
            echo "NX_NO_CLOUD=true" >> $GITHUB_ENV
            echo "⚠️  NX Cloud DISABLED (requested by 'skip-nx-cloud' label to conserve credits)"
            echo "💾 Local cache will still be used"
          else
            echo "NX_NO_CLOUD=false" >> $GITHUB_ENV
            echo "✅ NX Cloud ENABLED"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: 🧪 Run E2E tests
        run: npx nx e2e e2e --configuration=ci
        env:
          TESTING: false
          BACKEND_DATABASE_URL: sqlite:///./test.db
          BACKEND_WEATHERAPI_KEY: test_key
          BACKEND_METEOBLUE_API_KEY: test_key
          BACKEND_STRAVA_VERIFY_TOKEN: PARAPENTE_E2E_TEST
      
      - name: 📤 Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: apps/e2e/test-results
          retention-days: 7
