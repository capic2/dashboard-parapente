[pytest]
# Pytest configuration for Dashboard Parapente backend
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    integration: integration tests (require live data)
    unit: unit tests (isolated)
    slow: slow tests
